openapi: 3.1.0

info:
  title: Camera Stream ↔ AI Vision Contract

  version: 1.0.0

  description: |
    Contract giữa Camera Stream service và AI Vision service
    cho chức năng phân tích frame camera realtime.

  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn

servers:
  - url: http://localhost:4010
    description: Prism mock server

  - url: https://api.campus.local
    description: Class network placeholder

tags:
  - name: health

  - name: detection

  - name: frames

security:
  - bearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra service còn hoạt động.
      tags: [health]
      security: []

      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision-service
                    time: '2026-05-10T08:00:00Z'

  /detect:
    post:
      operationId: analyzeFrame
      summary: Phân tích frame camera

      description: |
        Gửi frame camera sang AI Vision service
        để nhận kết quả nhận diện.

      tags:
        - detection

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeFrameRequest'

            examples:
              personDetection:
                value:
                  cameraId: CAM-01
                  frameUrl: https://campus.local/frame-001.jpg
                  timestamp: '2026-05-10T08:00:00Z'

      responses:
        '201':
          description: Phân tích thành công

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'

              examples:
                detected:
                  value:
                    detectionId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    detectionType: PERSON
                    confidence: 0.98
                    cameraId: CAM-01
                    frameUrl: https://campus.local/frame-001.jpg
                    timestamp: '2026-05-10T08:00:00Z'
                    detectedAt: '2026-05-10T08:00:02Z'
                    trackingId: TRACK-001

        '400':
          $ref: '#/components/responses/BadRequest'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '422':
          $ref: '#/components/responses/UnprocessableEntity'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /detections:
    get:
      operationId: listDetections
      summary: Lấy danh sách kết quả nhận diện
      description: Danh sách detection với cursor pagination.
      tags: [detection]

      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'

      responses:
        '200':
          description: Danh sách detection

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionPage'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /detections/recent:
    get:
      operationId: getRecentDetections
      summary: Lấy detection gần đây

      description: Trả về detection mới nhất từ AI Vision service.

      tags:
        - detection

      parameters:
        - name: limit
          in: query
          required: false

          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20

      responses:
        '200':
          description: Detection gần đây

          content:
            application/json:
              schema:
                type: object
                additionalProperties: false

                required:
                  - items

                properties:
                  items:
                    type: array

                    items:
                      $ref: '#/components/schemas/DetectionResult'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '500':
          $ref: '#/components/responses/InternalServerError'

  /detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy chi tiết detection

      description: Trả về thông tin detection theo ID.

      tags:
        - detection

      parameters:
        - name: detectionId
          in: path
          required: true

          schema:
            type: string
            format: uuid

      responses:
        '200':
          description: Chi tiết detection

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'

        '401':
          $ref: '#/components/responses/Unauthorized'

        '404':
          $ref: '#/components/responses/NotFound'

        '500':
          $ref: '#/components/responses/InternalServerError'

webhooks:
  detectionCreated:
    post:
      operationId: onDetectionCreated
      summary: Webhook khi có detection mới
      description: AI Vision service gửi webhook khi phát hiện object mới.
      tags: [detection]

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionResult'

      responses:
        '200':
          description: Consumer đã nhận detection webhook

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của detection.
      schema:
        type: string
        format: uuid

    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor dùng để lấy trang tiếp theo.
      schema:
        type: [string, 'null']
        minLength: 1
        maxLength: 200

    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    HealthStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - time

      properties:
        status:
          type: string
          enum: [ok]
          example: ok

        service:
          type: string
          minLength: 2
          maxLength: 80
          example: ai-vision-service

        time:
          type: string
          format: date-time
          example: '2026-05-10T08:00:00Z'

    AnalyzeFrameRequest:
      type: object
      additionalProperties: false

      required:
        - cameraId
        - frameUrl
        - timestamp

      properties:
        cameraId:
          type: string
          pattern: '^CAM-[0-9]{2}$'
          description: ID camera gửi frame.
          example: CAM-01

        frameUrl:
          type: string
          format: uri
          description: URL của frame image.
          example: https://campus.local/frame-001.jpg

        timestamp:
          type: string
          format: date-time
          description: Thời điểm frame được capture.
          example: '2026-05-10T08:00:00Z'

    DetectionResult:
      type: object
      additionalProperties: false

      required:
        - detectionId
        - detectionType
        - confidence
        - cameraId
        - frameUrl
        - timestamp
        - detectedAt
        - trackingId

      properties:
        detectionId:
          type: string
          format: uuid

        detectionType:
          type: string
          enum:
            - PERSON
            - VEHICLE
            - UNKNOWN_OBJECT

        confidence:
          type: number
          minimum: 0
          maximum: 1

        cameraId:
          type: string

        frameUrl:
          type: string
          format: uri

        timestamp:
          type: string
          format: date-time

        detectedAt:
          type: string
          format: date-time

        trackingId:
          type: [string, 'null']

    DetectionPage:
      type: object
      additionalProperties: false

      required:
        - items
        - nextCursor
        - hasMore

      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100

          items:
            $ref: '#/components/schemas/DetectionResult'

        nextCursor:
          type: [string, 'null']
          example: null

        hasMore:
          type: boolean
          example: false

    VisionEvent:
      oneOf:
        - $ref: '#/components/schemas/PersonDetection'
        - $ref: '#/components/schemas/VehicleDetection'

      discriminator:
        propertyName: detectionType

    PersonDetection:
      allOf:
        - $ref: '#/components/schemas/DetectionResult'

        - type: object
          properties:
            detectionType:
              type: string
              const: PERSON

    VehicleDetection:
      allOf:
        - $ref: '#/components/schemas/DetectionResult'

        - type: object
          properties:
            detectionType:
              type: string
              const: VEHICLE

    Problem:
      type: object
      additionalProperties: false

      required:
        - type
        - title
        - status

      properties:
        type:
          type: string
          format: uri
          example: https://campus.local/errors/validation

        title:
          type: string
          example: Invalid request

        status:
          type: integer
          example: 400

        detail:
          type: [string, 'null']
          example: Invalid frame URL

        instance:
          type: [string, 'null']
          format: uri
          example: https://campus.local/detect

  responses:

    BadRequest:
      description: Invalid request payload
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    Unauthorized:
      description: Unauthorized request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

